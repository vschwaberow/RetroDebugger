name: Linux build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout RetroDebugger
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libsdl2-dev \
            libglew-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Build and stage release (no zip; GitHub zips the artifact once)
        id: release
        run: |
          set -euxo pipefail
          chmod +x ./tools/make-release/make-release-linux.sh
          ./tools/make-release/make-release-linux.sh --no-zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: ${{ steps.release.outputs.release_dir }}
          if-no-files-found: error
